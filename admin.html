<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم الملكية — Luck Domino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2 family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --dark: #0F0C08;
      --ebony: #1A1410;
      --mid: #3D3020;
      --ivory: #F5F0E8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
    body {
      background: var(--dark);
      color: var(--ivory);
      padding: 30px;
      background-image: radial-gradient(circle at 50% 50%, var(--ebony) 0%, var(--dark) 100%);
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: var(--gold);
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      font-weight: 900;
    }
    .subtitle { text-align: center; color: #8A7D6A; margin-bottom: 40px; }
    .card {
      background: rgba(26, 20, 16, 0.8);
      border: 1px solid var(--mid);
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      transition: transform 0.3s, border-color 0.3s;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: var(--gold);
    }
    .card h3 { color: var(--gold-light); margin-bottom: 15px; font-size: 1.3rem; border-bottom: 1px solid var(--mid); padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 8px; color: #b5a895; font-size: 0.9rem; }
    input {
      width: 100%;
      padding: 12px;
      background: #0F0C08;
      border: 1px solid var(--mid);
      color: #fff;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: var(--gold-light); }
    button {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark, #8B6914) 100%);
      color: var(--dark);
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1.05rem;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: all 0.3s;
    }
    button:hover {
      background: var(--gold-light);
      box-shadow: 0 6px 12px rgba(201, 168, 76, 0.3);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🁣 لوحة التحكم وإدارة الأسعار</h1>
    <p class="subtitle">تعديل البيانات هنا يغير محتوى موقع الزبائن تلقائياً وفوراً</p>

    <div class="card">
      <h3>المنتج الأول: Luck Domino (الإصدار الأساسي)</h3>
      <div class="form-group">
        <label>السعر الجديد (ج.م):</label>
        <input type="number" id="admin-price-p1" placeholder="مثال: 249">
      </div>
      <div class="form-group">
        <label>الوصف أو العرض الفرعي:</label>
        <input type="text" id="admin-sub-p1" placeholder="مثال: دومينو فرعوني — الإصدار الذهبي">
      </div>
      <button onclick="updateProduct('p1')">تحديث وإرسال التعديلات</button>
    </div>

    <div class="card">
      <h3>المنتج الثاني: Luck Stadium (باقة الاستاد)</h3>
      <div class="form-group">
        <label>السعر الجديد (ج.م):</label>
        <input type="number" id="admin-price-p2" placeholder="مثال: 399">
      </div>
      <div class="form-group">
        <label>الوصف أو العرض الفرعي:</label>
        <input type="text" id="admin-sub-p2" placeholder="مثال: ستاد الحظ والألعاب الحماسية">
      </div>
      <button onclick="updateProduct('p2')">تحديث وإرسال التعديلات</button>
    </div>

    <div class="card">
      <h3>المنتج الثالث: VIP Package (الباقة الملكية)</h3>
      <div class="form-group">
        <label>السعر الجديد (ج.م):</label>
        <input type="number" id="admin-price-p3" placeholder="مثال: 599">
      </div>
      <div class="form-group">
        <label>الوصف أو العرض الفرعي:</label>
        <input type="text" id="admin-sub-p3" placeholder="مثال: باقة الـ VIP الملكية المتكاملة">
      </div>
      <button onclick="updateProduct('p3')">تحديث وإرسال التعديلات</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <script>
    // ⚠️ ضع هنا الـ firebaseConfig الخاص بمشروعك المأخوذ من إعدادات Firebase Console
    const firebaseConfig = {
      apiKey: "ضع_هنا_الـ_API_KEY",
      authDomain: "luck-domino.firebaseapp.com",
      databaseURL: "https://luck-domino-default-rtdb.firebaseio.com",
      projectId: "luck-domino",
      storageBucket: "luck-domino.appspot.com",
      messagingSenderId: "...",
      appId: "..."
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // دالة تحديث المنتج في الـ Realtime Database فوراً
    function updateProduct(id) {
      const newPrice = parseInt(document.getElementById(`admin-price-0{id}`).value);
      const newSub = document.getElementById(`admin-sub-0{id}`).value;

      if (!newPrice || !newSub) {
        alert("يرجى ملء الحقول الخاصة بالمنتج قبل الحفظ!");
        return;
      }

      database.ref('products/' + id).set({
        price: newPrice,
        subtitle: newSub
      }).then(() => {
        alert(`تم تحديث بيانات المنتج ${id} بنجاح في السيرفر وموقع العملاء!`);
      }).catch(err => {
        alert("خطأ أثناء الاتصال بـ Firebase: " + err.message);
      });
    }
  </script>
</body>
</html>
